# ~/.openclaw/config.yaml
# 複製此檔案到 SSH 553588 的 ~/.openclaw/config.yaml

server:
  port: 3000
  bind: 127.0.0.1            # 只綁定 localhost，透過 SSH Tunnel 存取

# ── AI 模型設定 ───────────────────────────────────
# 現階段：Anthropic Option B（Claude 訂閱 setup-token，非 API Key）
# 參考：https://docs.openclaw.ai/providers/anthropic
#
# 安裝步驟（在本機執行）：
#   1. claude setup-token
#   2. openclaw models auth setup-token --provider anthropic
#      （或跨機器：openclaw models auth paste-token --provider anthropic）
#
# 優點：使用 Claude 訂閱額度，無需 ANTHROPIC_API_KEY
# 注意：token 可能過期，需重新執行 claude setup-token 並重新 auth

agents:
  defaults:
    model:
      primary: "anthropic/claude-opus-4-6"   # Option B：綁定訂閱，非 API key

# ── 未來：切換至 MiniMax（成本最佳化）───────────────
# 參考：https://docs.openclaw.ai/providers/minimax
# 當 Claude 訂閱額度不足或需要降低成本時啟用
# 啟用方式：將下方區塊取消註解，並設定 MINIMAX_API_KEY 環境變數
#
# env:
#   MINIMAX_API_KEY: "sk-..."
#
# agents:
#   defaults:
#     model:
#       primary: "minimax/MiniMax-M2.5"
#
# models:
#   mode: merge
#   providers:
#     minimax:
#       baseUrl: "https://api.minimax.io/anthropic"   # 中國用戶改 api.minimaxi.com
#       apiKey: "${MINIMAX_API_KEY}"
#       api: "anthropic-messages"
#       models:
#         - id: MiniMax-M2.5
#           contextWindow: 200000   # 200K context（遠大於 Claude Sonnet）
#           maxTokens: 8192
#           cost:
#             input: 0.30           # $0.30 / 1M tokens
#             output: 1.20          # $1.20 / 1M tokens

# ── 多智能體通訊設定 ──────────────────────────────
sessions:
  visibility: "all"           # 讓所有智能體看到彼此的 session

agentToAgent:
  enabled: true               # 開啟智能體間直接通訊（預設關閉，需明確啟用）
  maxPingPongTurns: 5         # 最多 5 來回對話

# ── 智能體清單 ────────────────────────────────────
agents:
  - id: orchestrator
    name: 指揮官
    workspace: ~/.openclaw/agents/orchestrator/workspace/
    agentDir:  ~/.openclaw/agents/orchestrator/state/
    tools:
      allow: [sessions_send, sessions_spawn, sessions_list, memory_write, memory_read]

  - id: site-analyst
    name: 網站分析師
    workspace: ~/.openclaw/agents/site-analyst/workspace/
    agentDir:  ~/.openclaw/agents/site-analyst/state/
    tools:
      allow: [fetch_url, sessions_send, memory_write]

  - id: auth-agent
    name: 登入管家
    workspace: ~/.openclaw/agents/auth-agent/workspace/
    agentDir:  ~/.openclaw/agents/auth-agent/state/
    tools:
      allow: [browser_open, browser_click, browser_extract_text,
              sessions_send, memory_write, shell_safe]

  - id: book-fetcher
    name: 書本搬運工
    workspace: ~/.openclaw/agents/book-fetcher/workspace/
    agentDir:  ~/.openclaw/agents/book-fetcher/state/
    tools:
      allow: [browser_open, browser_scroll, browser_extract_text,
              fetch_url, write_file, memory_write, sessions_send]

  - id: summarizer
    name: 知識提煉師
    workspace: ~/.openclaw/agents/summarizer/workspace/
    agentDir:  ~/.openclaw/agents/summarizer/state/
    tools:
      allow: [read_file, write_file, memory_write, sessions_send]

  - id: publisher
    name: 網站發布師
    workspace: ~/.openclaw/agents/publisher/workspace/
    agentDir:  ~/.openclaw/agents/publisher/state/
    tools:
      allow: [read_file, write_file, shell_safe, memory_write, sessions_send]

# ── Telegram 控制介面 ─────────────────────────────
channels:
  telegram:
    enabled: true
    botToken: "${TELEGRAM_BOT_TOKEN}"    # BotFather 取得的 token
    allowFrom:
      - "${TELEGRAM_USER_ID}"            # 你的 Telegram 數字 ID
    groupAllowFrom: []
    chatTypes: ["private"]
    # webhookUrl: "https://your-domain/telegram/webhook"  # 有 HTTPS 時啟用

# ── 安全設定 ──────────────────────────────────────
manual_approval:
  - file_delete
  - shell_exec_dangerous
  - browser_oauth_authorize   # OAuth 授權前必須人工確認

memory:
  enabled: true
  path: ~/.openclaw/memory/
